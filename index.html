<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi & Simulation de Marché</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --surface2:  #222222;
      --border:    #2a2a2a;
      --accent:    #f97316;
      --accent-dim:#7c3a0e;
      --text:      #f0f0f0;
      --muted:     #888888;
      --up:        #22c55e;
      --down:      #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    .nav-logo {
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .nav-tabs {
      display: flex;
      gap: .25rem;
    }
    .nav-tab {
      padding: .45rem 1.1rem;
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: all .15s;
    }
    .nav-tab:hover  { color: var(--text); background: var(--surface2); }
    .nav-tab.active { color: var(--accent); background: var(--surface2); }

    /* ── PAGES ── */
    .page { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text);
    }
    .section-title span {
      color: var(--accent);
    }

    /* ── SEARCH BAR ── */
    .search-row {
      display: flex;
      gap: .75rem;
      margin-bottom: 2rem;
    }
    .search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .7rem 1rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border .15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .7rem 1.4rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
    }

    /* ── WATCHLIST GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      position: relative;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .card-ticker {
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: .2rem;
    }
    .card-name {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-price {
      font-size: 1.35rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: .3rem;
    }
    .card-change {
      font-size: .82rem;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
    }
    .up   { color: var(--up); }
    .down { color: var(--down); }
    .card-remove {
      position: absolute;
      top: .6rem;
      right: .7rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
    }
    .card:hover .card-remove { opacity: 1; }

    /* loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
      height: 1em;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── CHART AREA ── */
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .chart-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .chart-asset-name { font-size: 1rem; font-weight: 600; }
    .chart-asset-price {
      font-size: 1.6rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-top: .15rem;
    }
    .chart-periods {
      display: flex;
      gap: .4rem;
    }
    .period-btn {
      padding: .3rem .7rem;
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all .15s;
    }
    .period-btn:hover  { color: var(--text); border-color: var(--muted); }
    .period-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(249,115,22,.08); }
    #mainChart {
      width: 100%;
      height: 240px;
      display: block;
    }

    /* ── SIMULATOR ── */
    .sim-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media(max-width:700px){ .sim-grid{ grid-template-columns:1fr; } }

    .sim-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .sim-panel h3 {
      font-size: .9rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 1.25rem;
    }
    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: .4rem;
    }
    .form-input, .form-select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .65rem .9rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border .15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-select option { background: var(--surface2); }

    .scenarios {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: .75rem;
      margin-top: 1.5rem;
    }
    .scenario-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }
    .scenario-card.pessimiste { border-color: var(--down); }
    .scenario-card.neutre     { border-color: var(--border); }
    .scenario-card.optimiste  { border-color: var(--up); }
    .scenario-label {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: .5rem;
    }
    .scenario-card.pessimiste .scenario-label { color: var(--down); }
    .scenario-card.neutre     .scenario-label { color: var(--muted); }
    .scenario-card.optimiste  .scenario-label { color: var(--up); }
    .scenario-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: .2rem;
    }
    .scenario-rate {
      font-size: .75rem;
      color: var(--muted);
    }

    #simChart {
      width: 100%;
      height: 220px;
      display: block;
      margin-top: 1rem;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .empty-state p { font-size: .9rem; }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">S&SM</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('markets')">Marchés</button>
    <button class="nav-tab"        onclick="showPage('simulator')">Simulateur</button>
  </div>
</nav>

<!-- ══════════════ PAGE MARCHÉS ══════════════ -->
<div class="page active" id="page-markets">

  <div class="search-row">
    <input class="search-input" id="searchInput" placeholder="Rechercher un actif : AAPL, BTC-EUR, IWDA.AS …" />
    <button class="btn" onclick="addAsset()">Ajouter</button>
  </div>

  <p class="section-title">Ma <span>watchlist</span></p>
  <div class="cards-grid" id="watchlistGrid"></div>

  <div class="chart-container" id="chartArea" style="display:none">
    <div class="chart-header">
      <div>
        <div class="chart-asset-name" id="chartName">—</div>
        <div class="chart-asset-price" id="chartPrice">—</div>
        <div class="card-change" id="chartChange">—</div>
      </div>
      <div class="chart-periods">
        <button class="period-btn active" onclick="setPeriod('5d',this)">5J</button>
        <button class="period-btn"        onclick="setPeriod('1mo',this)">1M</button>
        <button class="period-btn"        onclick="setPeriod('6mo',this)">6M</button>
        <button class="period-btn"        onclick="setPeriod('1y',this)">1A</button>
        <button class="period-btn"        onclick="setPeriod('5y',this)">5A</button>
      </div>
    </div>
    <canvas id="mainChart"></canvas>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="icon">📈</div>
    <p>Ajoute un actif pour commencer à suivre les marchés.</p>
  </div>
</div>

<!-- ══════════════ PAGE SIMULATEUR ══════════════ -->
<div class="page" id="page-simulator">
  <p class="section-title">Simulation de <span>portefeuille</span></p>

  <div class="sim-grid">
    <div class="sim-panel">
      <h3>Paramètres</h3>

      <div class="form-group">
        <label class="form-label">Montant initial (€)</label>
        <input class="form-input" id="simAmount" type="number" value="1000" min="1"/>
      </div>
      <div class="form-group">
        <label class="form-label">Versement mensuel (€)</label>
        <input class="form-input" id="simMonthly" type="number" value="0" min="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Durée (années)</label>
        <input class="form-input" id="simYears" type="number" value="10" min="1" max="50"/>
      </div>
      <div class="form-group">
        <label class="form-label">Type d'actif</label>
        <select class="form-select" id="simAssetType" onchange="updateRates()">
          <option value="etf_world">ETF World (ex. MSCI World)</option>
          <option value="etf_sp500">ETF S&amp;P 500</option>
          <option value="bond">Obligations</option>
          <option value="crypto">Crypto (Bitcoin)</option>
          <option value="custom">Taux personnalisés</option>
        </select>
      </div>
      <div id="customRates" style="display:none">
        <div class="form-group">
          <label class="form-label">Taux pessimiste (%/an)</label>
          <input class="form-input" id="ratePess" type="number" value="2"/>
        </div>
        <div class="form-group">
          <label class="form-label">Taux neutre (%/an)</label>
          <input class="form-input" id="rateNeu" type="number" value="6"/>
        </div>
        <div class="form-group">
          <label class="form-label">Taux optimiste (%/an)</label>
          <input class="form-input" id="rateOpt" type="number" value="10"/>
        </div>
      </div>

      <button class="btn" style="width:100%;margin-top:.5rem" onclick="runSim()">Simuler</button>
    </div>

    <div class="sim-panel">
      <h3>Résultats</h3>
      <div class="scenarios" id="scenariosOutput">
        <div class="scenario-card pessimiste">
          <div class="scenario-label">Pessimiste</div>
          <div class="scenario-value" id="resPess">—</div>
          <div class="scenario-rate" id="ratePessLabel">—</div>
        </div>
        <div class="scenario-card neutre">
          <div class="scenario-label">Neutre</div>
          <div class="scenario-value" id="resNeu">—</div>
          <div class="scenario-rate" id="rateNeuLabel">—</div>
        </div>
        <div class="scenario-card optimiste">
          <div class="scenario-label">Optimiste</div>
          <div class="scenario-value" id="resOpt">—</div>
          <div class="scenario-rate" id="rateOptLabel">—</div>
        </div>
      </div>
      <canvas id="simChart"></canvas>
    </div>
  </div>
</div>

<!-- ══════════════ SCRIPTS ══════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ───────────────────── helpers ───────────────────── */
const PROXY = "https://query1.finance.yahoo.com/v8/finance/chart/";

async function fetchQuote(symbol) {
  const url = `https://corsproxy.io/?${encodeURIComponent(PROXY + symbol + "?interval=1d&range=1d")}`;
  const r = await fetch(url);
  const d = await r.json();
  const meta = d.chart.result[0].meta;
  return {
    price:  meta.regularMarketPrice,
    prev:   meta.chartPreviousClose,
    name:   meta.shortName || symbol,
    symbol: symbol.toUpperCase()
  };
}

async function fetchHistory(symbol, period) {
  const url = `https://corsproxy.io/?${encodeURIComponent(PROXY + symbol + "?interval=1d&range=" + period)}`;
  const r = await fetch(url);
  const d = await r.json();
  const res = d.chart.result[0];
  const ts    = res.timestamps;
  const close = res.indicators.quote[0].close;
  return ts.map((t,i) => ({ x: new Date(t*1000), y: close[i] })).filter(p => p.y != null);
}

function fmt(n) {
  if (n >= 1000) return n.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2});
  return n.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:4});
}

/* ───────────────────── state ───────────────────── */
let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
let mainChartInstance = null;
let simChartInstance  = null;
let currentSymbol = null;
let currentPeriod = '5d';

/* ───────────────────── navigation ───────────────────── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.target.classList.add('active');
}

/* ───────────────────── watchlist ───────────────────── */
async function addAsset() {
  const input = document.getElementById('searchInput');
  const sym = input.value.trim().toUpperCase();
  if (!sym || watchlist.includes(sym)) { input.value=''; return; }
  watchlist.push(sym);
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
  input.value = '';
  renderCards();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addAsset();
});

function removeAsset(sym) {
  watchlist = watchlist.filter(s => s !== sym);
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
  if (currentSymbol === sym) {
    document.getElementById('chartArea').style.display = 'none';
    currentSymbol = null;
  }
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('watchlistGrid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = '';
  if (watchlist.length === 0) { empty.style.display='block'; return; }
  empty.style.display = 'none';

  watchlist.forEach(sym => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <button class="card-remove" onclick="event.stopPropagation();removeAsset('${sym}')">✕</button>
      <div class="card-ticker">${sym}</div>
      <div class="card-name skeleton" style="width:70%;margin-bottom:.75rem">&nbsp;</div>
      <div class="card-price skeleton" style="width:50%">&nbsp;</div>
      <div class="card-change" style="margin-top:.3rem">—</div>`;
    card.onclick = () => loadChart(sym);
    grid.appendChild(card);

    fetchQuote(sym).then(q => {
      const change = ((q.price - q.prev) / q.prev * 100);
      const dir    = change >= 0 ? 'up' : 'down';
      card.querySelector('.card-name').className  = 'card-name';
      card.querySelector('.card-name').textContent = q.name;
      card.querySelector('.card-price').className = 'card-price';
      card.querySelector('.card-price').textContent = fmt(q.price) + ' €';
      card.querySelector('.card-change').className = `card-change ${dir}`;
      card.querySelector('.card-change').textContent = `${change>=0?'+':''}${change.toFixed(2)}%`;
    }).catch(() => {
      card.querySelector('.card-name').className  = 'card-name';
      card.querySelector('.card-name').textContent = 'Erreur de chargement';
    });
  });
}

/* ───────────────────── chart ───────────────────── */
async function loadChart(sym) {
  currentSymbol = sym;
  document.getElementById('chartArea').style.display = 'block';
  document.getElementById('chartName').textContent  = sym;
  document.getElementById('chartPrice').textContent = '…';
  document.getElementById('chartChange').textContent = '';

  const [quote, history] = await Promise.all([
    fetchQuote(sym),
    fetchHistory(sym, currentPeriod)
  ]);

  const change = ((quote.price - quote.prev) / quote.prev * 100);
  const dir    = change >= 0 ? 'up' : 'down';
  document.getElementById('chartName').textContent   = quote.name;
  document.getElementById('chartPrice').textContent  = fmt(quote.price) + ' €';
  document.getElementById('chartChange').className   = `card-change ${dir}`;
  document.getElementById('chartChange').textContent = `${change>=0?'+':''}${change.toFixed(2)}% aujourd'hui`;

  const color = dir === 'up' ? '#22c55e' : '#ef4444';
  drawMainChart(history, color);
  document.getElementById('chartArea').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function drawMainChart(data, color) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChartInstance) mainChartInstance.destroy();
  mainChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        data: data,
        borderColor: color,
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0,0,0,220);
          g.addColorStop(0, color + '33');
          g.addColorStop(1, color + '00');
          return g;
        },
        tension: .3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400 },
      plugins: { legend: { display:false }, tooltip: {
        callbacks: { label: c => ' ' + fmt(c.parsed.y) + ' €' }
      }},
      scales: {
        x: { type:'time', time:{ tooltipFormat:'dd MMM yyyy' },
             grid:{ color:'#1f1f1f' }, ticks:{ color:'#888', maxTicksLimit:6, font:{size:11} } },
        y: { grid:{ color:'#1f1f1f' }, ticks:{ color:'#888', font:{size:11},
             callback: v => fmt(v) } }
      }
    }
  });
}

function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentSymbol) loadChart(currentSymbol);
}

/* ───────────────────── simulator ───────────────────── */
const RATES = {
  etf_world:  { pess:3,  neu:7,  opt:12 },
  etf_sp500:  { pess:4,  neu:8,  opt:14 },
  bond:        { pess:1,  neu:3,  opt:5  },
  crypto:      { pess:-20, neu:15, opt:50 },
};

function updateRates() {
  const t = document.getElementById('simAssetType').value;
  document.getElementById('customRates').style.display = t==='custom' ? 'block' : 'none';
}

function compound(initial, monthly, years, rate) {
  const r = rate / 100 / 12;
  const n = years * 12;
  let val = initial;
  for (let i = 0; i < n; i++) {
    val = val * (1 + r) + monthly;
  }
  return val;
}

function runSim() {
  const amount  = parseFloat(document.getElementById('simAmount').value) || 0;
  const monthly = parseFloat(document.getElementById('simMonthly').value) || 0;
  const years   = parseInt(document.getElementById('simYears').value) || 10;
  const type    = document.getElementById('simAssetType').value;

  let rates;
  if (type === 'custom') {
    rates = {
      pess: parseFloat(document.getElementById('ratePess').value),
      neu:  parseFloat(document.getElementById('rateNeu').value),
      opt:  parseFloat(document.getElementById('rateOpt').value),
    };
  } else {
    rates = RATES[type];
  }

  const vPess = compound(amount, monthly, years, rates.pess);
  const vNeu  = compound(amount, monthly, years, rates.neu);
  const vOpt  = compound(amount, monthly, years, rates.opt);

  document.getElementById('resPess').textContent = fmt(vPess) + ' €';
  document.getElementById('resNeu').textContent  = fmt(vNeu)  + ' €';
  document.getElementById('resOpt').textContent  = fmt(vOpt)  + ' €';
  document.getElementById('ratePessLabel').textContent = rates.pess + '%/an';
  document.getElementById('rateNeuLabel').textContent  = rates.neu  + '%/an';
  document.getElementById('rateOptLabel').textContent  = rates.opt  + '%/an';

  // build year-by-year data
  const labels = Array.from({length: years+1}, (_,i) => 'An ' + i);
  const dPess  = Array.from({length: years+1}, (_,i) => compound(amount, monthly, i, rates.pess));
  const dNeu   = Array.from({length: years+1}, (_,i) => compound(amount, monthly, i, rates.neu));
  const dOpt   = Array.from({length: years+1}, (_,i) => compound(amount, monthly, i, rates.opt));

  const ctx = document.getElementById('simChart').getContext('2d');
  if (simChartInstance) simChartInstance.destroy();
  simChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'Pessimiste', data:dPess, borderColor:'#ef4444', borderWidth:1.5, pointRadius:0, tension:.3, fill:false },
        { label:'Neutre',     data:dNeu,  borderColor:'#888',    borderWidth:1.5, pointRadius:0, tension:.3, fill:false },
        { label:'Optimiste',  data:dOpt,  borderColor:'#22c55e', borderWidth:1.5, pointRadius:0, tension:.3, fill:false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:'#888', font:{size:11} } },
        tooltip: { callbacks: { label: c => ' ' + c.dataset.label + ' : ' + fmt(c.parsed.y) + ' €' } }
      },
      scales: {
        x: { grid:{color:'#1f1f1f'}, ticks:{color:'#888', font:{size:10}} },
        y: { grid:{color:'#1f1f1f'}, ticks:{color:'#888', font:{size:10}, callback: v => fmt(v)+'€' } }
      }
    }
  });
}

/* ───────────────────── init ───────────────────── */
// pre-load default watchlist
if (watchlist.length === 0) {
  watchlist = ['AAPL', 'IWDA.AS', 'BTC-EUR'];
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
}
renderCards();
updateRates();
runSim();
</script>
</body>
</html>
